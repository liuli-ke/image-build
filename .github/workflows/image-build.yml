name: build-multi-arch-images

on:
  workflow_dispatch:
    inputs:
      working_directory:
        description: '工作目录（Dockerfile 所在目录，相对于仓库根目录）'
        required: true
        default: '.'
      dockerfile:
        description: 'Dockerfile 文件名（位于工作目录下）'
        required: true
        default: 'Dockerfile'
      image_name:
        description: '完整镜像名（例如 "myregistry/myimage"）'
        required: true
      image_tag:
        description: '镜像标签（例如 "latest"）'
        required: true
        default: 'latest'
      release_tag:
        description: 'Release 标签（可选，留空则使用镜像标签，注意：不能含空格，会自动转换）'
        required: false
        default: ''

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Validate inputs and change to working directory
        run: |
          # 检查工作目录是否存在
          if [ ! -d "${{ inputs.working_directory }}" ]; then
            echo "错误：工作目录不存在 -> ${{ inputs.working_directory }}"
            exit 1
          fi
          cd "${{ inputs.working_directory }}"
          # 检查 Dockerfile 是否存在
          if [ ! -f "${{ inputs.dockerfile }}" ]; then
            echo "错误：Dockerfile 不存在于工作目录下 -> ${{ inputs.working_directory }}/${{ inputs.dockerfile }}"
            exit 1
          fi
          # 将工作目录路径保存到环境变量，供后续步骤使用（因为后续步骤需要 cd 回来或知道路径）
          echo "WORKING_DIR=$(pwd)" >> $GITHUB_ENV

      - name: Build and load amd64 image
        run: |
          cd "${{ inputs.working_directory }}"
          docker buildx build \
            --platform linux/amd64 \
            -t "${{ inputs.image_name }}:${{ inputs.image_tag }}-amd64" \
            -f "${{ inputs.dockerfile }}" \
            . \
            --load

      - name: Build and load arm64 image
        run: |
          cd "${{ inputs.working_directory }}"
          docker buildx build \
            --platform linux/arm64 \
            -t "${{ inputs.image_name }}:${{ inputs.image_tag }}-arm64" \
            -f "${{ inputs.dockerfile }}" \
            . \
            --load

      - name: Generate short image name
        id: short_name
        run: |
          short_name="${image_name##*/}"
          echo "short_name=$short_name" >> $GITHUB_OUTPUT
        env:
          image_name: ${{ inputs.image_name }}

      - name: Save and compress multi-arch images
        run: |
          tar_file="${{ steps.short_name.outputs.short_name }}-${{ inputs.image_tag }}-multi_arch.tar.gz"
          docker save \
            "${{ inputs.image_name }}:${{ inputs.image_tag }}-amd64" \
            "${{ inputs.image_name }}:${{ inputs.image_tag }}-arm64" \
            | gzip > "$tar_file"
          echo "TAR_FILE=$tar_file" >> $GITHUB_ENV

      - name: Generate MD5 checksum
        run: |
          md5sum "${{ env.TAR_FILE }}" > "${{ env.TAR_FILE }}.md5"

      - name: Sanitize tag name
        id: sanitize
        run: |
          raw_tag="${{ inputs.release_tag }}"
          if [ -z "$raw_tag" ]; then
            raw_tag="${{ inputs.image_tag }}"
          fi
          # 将非法字符（空格、斜杠、冒号等）替换为连字符，并去除首尾的非法字符
          sanitized=$(echo "$raw_tag" | sed -e 's/[^a-zA-Z0-9._-]/-/g' -e 's/^[-._]*//' -e 's/[-._]*$//')
          echo "sanitized_tag=$sanitized" >> $GITHUB_OUTPUT
          echo "原始 tag: $raw_tag -> 清理后: $sanitized"

      - name: Create Release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.sanitize.outputs.sanitized_tag }}
          name: Release ${{ steps.sanitize.outputs.sanitized_tag }}
          draft: false
          prerelease: false
          files: |
            ${{ env.TAR_FILE }}
            ${{ env.TAR_FILE }}.md5
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
