name: build-multi-arch-images

on:
  workflow_dispatch:
    inputs:
      context:
        description: '构建上下文路径（例如 "." 或 "./app"）'
        required: true
        default: '.'
      dockerfile:
        description: 'Dockerfile 路径（例如 "Dockerfile" 或 "path/to/Dockerfile"）'
        required: true
        default: 'Dockerfile'
      image_name:
        description: '完整镜像名（例如 "liulike/image"）'
        required: true
      image_tag:
        description: '镜像标签（例如 "latest"）'
        required: true
        default: 'latest'
      release_tag:
        description: 'Release 标签（默认使用镜像标签，建议使用唯一值，如 "v1.0.0"）'
        required: false
        default: ''

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write          # 允许创建 Release 和上传附件
      packages: read           # 可选，如果需要从 GitHub Container Registry 拉取基础镜像

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Validate inputs
        run: |
          if [ ! -f "${{ inputs.dockerfile }}" ]; then
            echo "错误：Dockerfile 文件不存在 -> ${{ inputs.dockerfile }}"
            exit 1
          fi
          if [ ! -d "${{ inputs.context }}" ]; then
            echo "错误：构建上下文目录不存在 -> ${{ inputs.context }}"
            exit 1
          fi

      - name: Build and load amd64 image
        run: |
          docker buildx build \
            --platform linux/amd64 \
            -t "${{ inputs.image_name }}:${{ inputs.image_tag }}-amd64" \
            -f "${{ inputs.dockerfile }}" \
            "${{ inputs.context }}" \
            --load

      - name: Build and load arm64 image
        run: |
          docker buildx build \
            --platform linux/arm64 \
            -t "${{ inputs.image_name }}:${{ inputs.image_tag }}-arm64" \
            -f "${{ inputs.dockerfile }}" \
            "${{ inputs.context }}" \
            --load

      - name: Generate short image name (last part after last '/')
        id: short_name
        run: |
          short_name="${image_name##*/}"
          echo "short_name=$short_name" >> $GITHUB_OUTPUT
        env:
          image_name: ${{ inputs.image_name }}

      - name: Save and compress multi-arch images
        run: |
          tar_file="${{ steps.short_name.outputs.short_name }}-${{ inputs.image_tag }}-multi_arch.tar.gz"
          docker save \
            "${{ inputs.image_name }}:${{ inputs.image_tag }}-amd64" \
            "${{ inputs.image_name }}:${{ inputs.image_tag }}-arm64" \
            | gzip > "$tar_file"
          echo "TAR_FILE=$tar_file" >> $GITHUB_ENV

      - name: Generate MD5 checksum
        run: |
          md5sum "${{ env.TAR_FILE }}" > "${{ env.TAR_FILE }}.md5"

      - name: Determine release tag
        id: release_tag
        run: |
          if [ -z "${{ inputs.release_tag }}" ]; then
            echo "tag=${{ inputs.image_tag }}" >> $GITHUB_OUTPUT
          else
            echo "tag=${{ inputs.release_tag }}" >> $GITHUB_OUTPUT
          fi

      - name: Create Release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_tag.outputs.tag }}
          name: Release ${{ steps.release_tag.outputs.tag }}
          draft: false
          prerelease: false
          files: |
            ${{ env.TAR_FILE }}
            ${{ env.TAR_FILE }}.md5
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}